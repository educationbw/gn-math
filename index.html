<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zone Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode"> <h1>Zone Explorer</h1>

    <div id="topControls">
        <div id="dataButtons">
            <button onclick="saveData()">Export Data</button>
            <input type="file" id="fileInput" onchange="loadData(event)" style="display:none;">
            <button onclick="document.getElementById('fileInput').click()">Import Data</button>
        </div>
        <select id="sortOptions">
            <option value="id">Sort by ID</option>
            <option value="name">Sort by Name</option>
            <option value="popular">Sort by Popularity</option>
        </select>
    </div>

    <input type="text" id="searchBar" placeholder="Search for a zone...">
    
    <div class="zone-wrapper">
        <div class="zone-count" id="zoneCount">Zones Loaded: 0</div>
        <div id="container">
            </div>
    </div>

    <div id="zoneViewer">
        <div id="zoneInfo">
            <div id="zoneTitle">Loading...</div>
            <div id="zoneId">#0</div>
            <div id="controls">
                <button onclick="fullscreenZone()">Fullscreen</button>
                <button onclick="aboutBlank()">Open in New Tab</button>
                <button onclick="closeZone()" style="background-color: #ff4444;">Close</button>
            </div>
        </div>
        </div>

    <button id="darkModeToggle">🌓 Toggle Theme</button>

    <script src="script.js"></script>
</body>
</html>
